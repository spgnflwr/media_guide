<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청약가이드 매니저</title>
<style>
:root {
  --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-200:#7FB8EE;--blue-600:#185FA5;--blue-800:#0C447C;--blue-900:#042C53;
  --green-50:#EAF3DE;--green-100:#C0DD97;--green-600:#3B6D11;--green-800:#27500A;
  --amber-50:#FAEEDA;--amber-100:#FAC775;--amber-600:#854F0B;--amber-800:#633806;
  --red-50:#FCEBEB;--red-200:#F7C1C1;--red-600:#A32D2D;
  --coral-50:#FAECE7;--coral-600:#993C1D;--coral-800:#712B13;
  --gray-50:#F8F8F6;--gray-100:#EFEFEB;--gray-200:#D3D1C7;--gray-500:#888780;--gray-800:#2C2C2A;
  --border:#E2E0D8;--text:#1A1A18;--text-2:#5F5E5A;--text-3:#888780;
  --bg:#F2F1ED;--surface:#FFFFFF;
  --r:8px;--r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-width:1100px;}

/* ── 공통 ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--blue-600);color:#fff;} .btn-primary:hover{background:var(--blue-800);}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border);} .btn-ghost:hover{background:var(--gray-50);}
.btn-danger{background:var(--red-50);color:var(--red-600);border:1px solid var(--red-200);} .btn-danger:hover{background:var(--red-200);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}
.btn-icon{border:none;background:transparent;color:var(--text-3);font-size:14px;cursor:pointer;padding:2px 4px;line-height:1;font-family:inherit;}
.btn-icon:hover{color:var(--blue-600);}

/* ── SCREENS ── */
.screen{display:none;} .screen.active{display:block;}

/* ══ HOME ══ */
.home-wrap{max-width:900px;margin:0 auto;padding:48px 40px;}
.home-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.home-title{font-size:24px;font-weight:700;letter-spacing:-.3px;}
.home-sub{font-size:13px;color:var(--text-2);margin-top:4px;}
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.guide-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;cursor:pointer;transition:box-shadow .15s;}
.guide-card:hover{box-shadow:0 2px 16px rgba(0,0,0,.1);}
.gc-tag{font-size:10px;font-weight:700;color:var(--blue-600);background:var(--blue-50);padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;}
.gc-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.gc-sub{font-size:12px;color:var(--text-2);}
.gc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.gc-stat{font-size:11px;color:var(--text-3);}
.gc-actions{display:flex;gap:6px;}
.empty-state{text-align:center;padding:64px 24px;color:var(--text-3);}
.empty-state-icon{font-size:40px;margin-bottom:12px;}
.empty-state-title{font-size:16px;font-weight:600;color:var(--text-2);margin-bottom:6px;}

/* ══ GUIDE PAGE ══ */
.guide-page{max-width:1700px;margin:0 auto;padding:28px 36px 100px;}

/* topbar */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.topbar-back{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:4px;padding:4px 0;font-family:inherit;}
.topbar-back:hover{color:var(--blue-600);}
.topbar-title-wrap{flex:1;}
.topbar-title{font-size:20px;font-weight:700;letter-spacing:-.2px;}
.topbar-sub{font-size:12px;color:var(--text-2);margin-top:2px;}
.editable-title{border:none;background:transparent;font-size:20px;font-weight:700;letter-spacing:-.2px;color:var(--text);font-family:inherit;padding:0;outline:none;width:100%;}
.editable-title:focus{background:#FFFDE6;border-radius:4px;padding:2px 6px;}
.editable-sub{border:none;background:transparent;font-size:12px;color:var(--text-2);font-family:inherit;padding:0;outline:none;width:100%;display:block;margin-top:2px;}
.editable-sub:focus{background:#FFFDE6;border-radius:4px;padding:2px 6px;}

/* section */
.sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--gray-50);border-bottom:1px solid var(--border);}
.sec-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;}
.sec-actions{display:flex;gap:6px;align-items:center;}

/* editable cell */
.ec{border:none;background:transparent;font:inherit;color:var(--text);padding:0;outline:none;width:100%;}
.ec:focus{background:#FFFDE6;border-radius:4px;padding:2px 5px;margin:-2px -5px;width:calc(100% + 10px);}
.ec-sm{font-size:11px;color:var(--text-3);}
.ec-sm:focus{background:#FFFDE6;border-radius:4px;padding:1px 4px;}
.ec-ta{border:none;background:transparent;font:inherit;font-size:12px;color:var(--text-2);padding:0;outline:none;resize:none;width:100%;min-height:28px;}
.ec-ta:focus{background:#FFFDE6;border-radius:4px;padding:2px 5px;}
.ec-sel{border:none;background:transparent;font:inherit;color:var(--text);padding:0;outline:none;cursor:pointer;}
.ec-sel:focus{background:#FFFDE6;border-radius:4px;padding:2px 4px;}

/* ── 캠페인 개요 테이블 ── */
.ov-table{width:100%;border-collapse:collapse;}
.ov-table td{padding:8px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ov-table tr:last-child td{border-bottom:none;}
.ov-key{width:160px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;background:var(--gray-50);}
.ov-del{width:32px;text-align:center;}

/* ── 예산배분 테이블 ── */
.bud-table{width:100%;border-collapse:collapse;}
.bud-table th{padding:7px 14px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;background:var(--gray-50);border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:left;white-space:nowrap;}
.bud-table th.r{text-align:right;}
.bud-table th:last-child{border-right:none;}
.bud-table td{padding:9px 14px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;}
.bud-table td.r{text-align:right;font-variant-numeric:tabular-nums;}
.bud-table td:last-child{border-right:none;}
.bud-table tr:last-child td{border-bottom:none;}
.bud-total td{background:var(--gray-50);font-weight:700;border-top:2px solid var(--border);}
.bucket-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}
.diff-pos{color:#A32D2D;font-size:11px;font-weight:700;} .diff-neg{color:#0F6E56;font-size:11px;font-weight:700;} .diff-zero{color:var(--text-3);font-size:11px;}
.mini-bar-wrap{height:4px;background:var(--gray-100);border-radius:2px;width:80px;display:inline-block;vertical-align:middle;}
.mini-bar-fill{height:4px;border-radius:2px;}
.bar-ok{background:#1D9E75;} .bar-over{background:#A32D2D;} .bar-low{background:var(--blue-600);}

/* ── 콜센터/가이드 테이블 ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.info-table{width:100%;border-collapse:collapse;}
.info-table td{padding:7px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.info-table tr:last-child td{border-bottom:none;}
.it-lbl{width:130px;background:var(--gray-50);}
.it-lbl-ec{font-size:11px;font-weight:600;color:var(--text-2);}
.it-del{width:28px;text-align:center;}

/* ── 버킷별 세부 채널 테이블 ── */
.bucket-section{margin-bottom:20px;}
.bucket-sec-head{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--r-lg) var(--r-lg) 0 0;border:1px solid transparent;border-bottom:none;}
.bsh-e{background:var(--blue-50);border-color:var(--blue-100);}
.bsh-x{background:var(--green-50);border-color:var(--green-100);}
.bsh-t{background:var(--coral-50);border-color:#F5C4B3;}
.bsh-p{background:#F3EEFF;border-color:#C9B8F5;}
.bsh-g{background:#E8F8F2;border-color:#9AE0C3;}
.bsh-title{font-size:14px;font-weight:700;flex:1;}
.bsh-e .bsh-title{color:var(--blue-800);}
.bsh-x .bsh-title{color:var(--green-800);}
.bsh-t .bsh-title{color:var(--coral-800);}
.bsh-p .bsh-title{color:#4A2C8F;}
.bsh-g .bsh-title{color:#0D5C3E;}
.bsh-amounts{text-align:right;font-size:11px;}
.bsh-target{opacity:.7;margin-bottom:2px;}
.bsh-e .bsh-target,.bsh-e .bsh-sum{color:var(--blue-800);}
.bsh-x .bsh-target,.bsh-x .bsh-sum{color:var(--green-800);}
.bsh-t .bsh-target,.bsh-t .bsh-sum{color:var(--coral-800);}
.bsh-p .bsh-target,.bsh-p .bsh-sum{color:#4A2C8F;}
.bsh-g .bsh-target,.bsh-g .bsh-sum{color:#0D5C3E;}
.bsh-sum{font-size:15px;font-weight:700;}
.bsh-actions{display:flex;gap:6px;align-items:center;}

.ch-table{width:100%;border-collapse:collapse;min-width:1200px;}
.ch-table th{padding:7px 10px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;background:var(--gray-50);border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;text-align:left;}
.ch-table th.r{text-align:right;}
.ch-table th.ag{background:#EEF5FF;color:var(--blue-800);border-bottom:2px solid var(--blue-200);}
.ch-table th:last-child{border-right:none;}
.ch-table td{padding:8px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;}
.ch-table td.r{text-align:right;font-variant-numeric:tabular-nums;}
.ch-table td.ag{background:rgba(230,241,251,.2);}
.ch-table td:last-child{border-right:none;}
.ch-table tr:last-child td{border-bottom:none;}
.ch-total td{background:var(--gray-50);font-weight:700;border-top:2px solid var(--border);}
.ch-ing td{background:#F0F6FF;}
.ch-alt td{background:#F4FAF0;}
.ch-2nd td{background:#FFFBF2;}
.ch-off td{background:#FAFAFA;color:var(--text-3);}

.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:3px;white-space:nowrap;}
.b-60{background:var(--blue-50);color:var(--blue-800);}
.b-90{background:var(--green-50);color:var(--green-800);}
.b-q{background:var(--amber-50);color:var(--amber-800);}
.b-ing{background:var(--blue-100);color:var(--blue-800);}
.b-alt{background:var(--green-100);color:var(--green-800);}
.b-2nd{background:var(--amber-100);color:var(--amber-800);}
.b-1st{background:#B5D4F4;color:var(--blue-900);}
.b-off{background:var(--gray-100);color:var(--gray-500);}

.col-no{width:32px;text-align:center;}
.col-ch{width:130px;}
.col-bud{width:130px;}
.col-sec{width:75px;}
.col-wish{width:75px;text-align:right;}
.col-roi{width:65px;text-align:right;}
.col-req{min-width:180px;max-width:220px;overflow:hidden;}
.col-conf{width:85px;}
.col-amt{width:120px;}
.col-unit{width:110px;}
.col-cmt{min-width:220px;}
.col-del{width:44px;text-align:center;}

/* grand bar */
.grand-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.grand-bar-left{font-size:12px;color:var(--text-2);}

/* status bar */
.sbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:9px 36px;display:flex;align-items:center;gap:14px;z-index:100;}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
.d-ok{background:#1D9E75;} .d-warn{background:#BA7517;} .d-saving{background:var(--blue-600);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:var(--surface);border-radius:var(--r-lg);padding:24px;width:520px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-lg{width:680px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.mf{margin-bottom:12px;}
.ml{font-size:10px;color:var(--text-2);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.mi{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font:inherit;outline:none;font-size:13px;}
.mi:focus{border-color:var(--blue-600);}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.m-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

/* toast */
.toast{position:fixed;top:20px;right:24px;background:var(--gray-800);color:#fff;font-size:12px;padding:10px 16px;border-radius:var(--r);opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;}
.toast.on{opacity:1;}

/* add-bucket-btn */
.add-bkt-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:2px dashed var(--border);border-radius:var(--r-lg);background:transparent;color:var(--text-3);font-size:13px;font-family:inherit;cursor:pointer;margin-bottom:16px;transition:all .15s;}
.add-bkt-btn:hover{border-color:var(--blue-200);color:var(--blue-600);background:var(--blue-50);}

/* roi colors */
.roi-h{color:#0F6E56;font-weight:700;} .roi-m{color:var(--blue-600);} .roi-l{color:var(--text-3);}
.muted{color:var(--text-3);text-decoration:line-through;}
.fw7{font-weight:700;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<!-- ══════════ HOME SCREEN ══════════ -->
<div id="screen-home" class="screen active">
<div class="home-wrap">
  <div class="home-header">
    <div>
      <div class="home-title">청약가이드 매니저</div>
      <div class="home-sub">월별 DRTV 청약가이드를 생성·관리합니다</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:11px;color:var(--text-3);">내 이름</span>
        <input id="my-name-input" style="border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;width:120px;outline:none;"
          placeholder="이름 입력" value=""
          onchange="updateMyName(this.value)" />
      </div>
      <button class="btn btn-primary" onclick="openNewGuideModal()">+ 새 청약가이드 생성</button>
    </div>
  </div>
  <div id="guide-list-wrap"></div>
</div>
</div>

<!-- ══════════ GUIDE SCREEN ══════════ -->
<div id="screen-guide" class="screen">
<div class="guide-page">

  <!-- topbar -->
  <div class="topbar">
    <button class="topbar-back" onclick="goHome()">← 목록</button>
    <div class="topbar-title-wrap">
      <input class="editable-title" id="guide-title-input" value="" oninput="updateGuideMeta('title',this.value)" />
      <input class="editable-sub" id="guide-sub-input" value="" oninput="updateGuideMeta('subtitle',this.value)" />
    </div>
    <!-- 접속자 표시 -->
    <div id="presence-bar" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;"></div>
    <button class="btn btn-ghost btn-sm" onclick="deleteCurrentGuide()">🗑 삭제</button>
    <button class="btn btn-ghost" onclick="reloadFromFirebase()">🔄 새로고침</button>
  </div>

  <!-- ① 캠페인 개요 -->
  <div class="sec" style="margin-bottom:14px;">
    <div class="sec-head">
      <span class="sec-label">캠페인 개요</span>
      <div class="sec-actions">
        <button class="btn-icon" onclick="addOvRow()" title="항목 추가">＋</button>
        <button class="btn btn-primary btn-sm" onclick="saveSection('overview')">💾 저장</button>
      </div>
    </div>
    <div id="ov-wrap"></div>
  </div>

  <!-- ② 예산 배분표 -->
  <div class="sec" style="margin-bottom:14px;">
    <div class="sec-head">
      <span class="sec-label">버킷별 예산 배분</span>
      <div class="sec-actions">
        <span style="font-size:11px;color:var(--text-3);">버킷 채널 합산값 자동 반영</span>
        <button class="btn btn-sm btn-ghost" onclick="openBucketModal()">+ 버킷 추가</button>
        <button class="btn btn-primary btn-sm" onclick="saveAllBucketMeta()">💾 저장</button>
      </div>
    </div>
    <div id="budget-table-wrap"></div>
  </div>

  <!-- ③ 콜센터/가이드 -->
  <div class="two-col" style="margin-bottom:14px;">
    <div class="sec">
      <div class="sec-head">
        <span class="sec-label">콜센터 운영 시간대</span>
        <div class="sec-actions">
          <button class="btn-icon" onclick="addCctRow()">＋</button>
          <button class="btn btn-primary btn-sm" onclick="saveSection('cct')">💾 저장</button>
        </div>
      </div>
      <div id="cct-wrap"></div>
    </div>
    <div class="sec">
      <div class="sec-head">
        <span class="sec-label">공통 편성 가이드</span>
        <div class="sec-actions">
          <button class="btn-icon" onclick="addGuideRow()">＋</button>
          <button class="btn btn-primary btn-sm" onclick="saveSection('guide')">💾 저장</button>
        </div>
      </div>
      <div id="guide-wrap"></div>
    </div>
  </div>

  <!-- ④ 버킷별 세부 채널 -->
  <div id="buckets-wrap"></div>
  <button class="add-bkt-btn" onclick="openBucketModal()">+ 새 버킷 추가</button>

</div>
</div>

<!-- Status bar -->
<div class="sbar" id="sbar" style="display:none;">
  <span style="font-size:11px;color:var(--text-2);"><span class="sdot d-ok" id="sDot"></span><span id="sTxt">저장됨</span></span>
  <span style="font-size:11px;color:var(--text-3);">마지막 저장: <strong id="sTime">-</strong></span>
  <span style="font-size:11px;color:var(--text-3);margin-left:auto;">셀 클릭 후 수정 → 자동 저장</span>
</div>

<!-- Modal: 새 가이드 -->
<div class="modal-bg" id="newGuideModal">
  <div class="modal">
    <div class="modal-title">새 청약가이드 생성</div>
    <div class="mf"><div class="ml">제목 *</div><input class="mi" id="ng-title" placeholder="예: WFP 2026년 8월 미디어플랜 가이드"></div>
    <div class="mf"><div class="ml">부제</div><input class="mi" id="ng-sub" placeholder="예: 2026년 8월 · 브리프 기준"></div>
    <div class="mrow">
      <div class="mf"><div class="ml">광고주</div><input class="mi" id="ng-client" placeholder="예: WFP"></div>
      <div class="mf"><div class="ml">총 예산 (VAT 별도)</div><input class="mi" id="ng-budget" type="number" placeholder="330000000"></div>
    </div>
    <div class="m-actions">
      <button class="btn btn-ghost" onclick="closeModal('newGuideModal')">취소</button>
      <button class="btn btn-primary" onclick="createGuide()">생성</button>
    </div>
  </div>
</div>

<!-- Modal: 버킷 추가 -->
<div class="modal-bg" id="bucketModal">
  <div class="modal">
    <div class="modal-title">버킷 추가</div>
    <div class="mf"><div class="ml">버킷 이름 *</div><input class="mi" id="bm-name" placeholder="예: 기존 DRTV, 신규 확장, 지상파"></div>
    <div class="mrow">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDpColK3e6FSOKLzwCdLqrO5WkWYVNqGXA",
  authDomain:        "media-guideline-dtv.firebaseapp.com",
  databaseURL:       "https://media-guideline-dtv-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "media-guideline-dtv",
  storageBucket:     "media-guideline-dtv.firebasestorage.app",
  messagingSenderId: "889580527444",
  appId:             "1:889580527444:web:db11730364cf724e4ef2c1",
  measurementId:     "G-T79G3NMWMY"
};

// ══════════════════════════════════════════════════
// Firebase 경로 규칙 (절대 변경 금지)
// 데이터 루트: guides/guides/{guideId}/...
// Presence:   presence/{sessionId}
// ══════════════════════════════════════════════════
const DB_ROOT = 'guides/guides'; // 실제 데이터 경로

try {
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // 세션
  const sid = 'sess_' + Math.random().toString(36).slice(2,9);
  window.__mySessionId = sid;
  window.__myName = localStorage.getItem('myName') || ('사용자' + sid.slice(-3));

  // ① 필드 단위 저장 (채널 자동 저장)
  window.__saveField = (path, value) => {
    update(ref(db), { [path]: value })
      .then(()=>setSaved('저장됨'))
      .catch(()=>setSaved('저장 실패'));
  };

  // ② 섹션 저장 (카드별 저장 버튼)
  window.__saveSection = (path, value) => {
    setSaving();
    update(ref(db), { [path]: value })
      .then(()=>{ setSaved('저장됨'); window.toast&&window.toast('저장되었습니다.'); })
      .catch(()=>setSaved('저장 실패'));
  };

  // ③ 전체 저장 (가이드 신규 생성)
  window.__saveDB = (data) => {
    const payload = data.guides || data;
    set(ref(db, DB_ROOT), payload)
      .then(()=>setSaved('저장됨'))
      .catch(()=>setSaved('저장 실패'));
  };

  // ④ 새로고침
  window.__reloadDB = () => {
    setSaving();
    onValue(ref(db, DB_ROOT), snap => {
      const v = snap.val();
      if(v) {
        window.STORE = { guides: v };
        window.__firebaseLoaded = true;
        window.__renderAll && window.__renderAll();
        setSaved('새로고침 완료');
        window.toast && window.toast('최신 데이터를 불러왔습니다.');
      } else {
        setSaved('데이터 없음');
      }
    }, {onlyOnce:true});
  };

  // ⑤ Presence
  const presRef = ref(db, `presence/${sid}`);
  set(presRef, { name: window.__myName, joinedAt: Date.now(), editing: '' });
  onDisconnect(presRef).remove();
  window.__updatePresence = (editing) => {
    update(presRef, {
      name: localStorage.getItem('myName') || window.__myName,
      editing: editing || '',
      updatedAt: Date.now()
    });
  };
  onValue(ref(db, 'presence'), snap => {
    renderPresence(snap.val() || {});
  });

  // ⑥ 초기 로드 (1회)
  onValue(ref(db, DB_ROOT), snap => {
    const v = snap.val();
    if(v) {
      window.STORE = { guides: v };
      window.__firebaseLoaded = true;
      window.__onLoaded && window.__onLoaded();
      setSaved('Firebase 연결됨');

} catch(e) { setSaved('오프라인 모드'); }
</script>

<script>
// ══════════════════════════════════════════════════
// STORE  — { guides: { [id]: GuideDoc } }
// GuideDoc = { id, title, subtitle, meta, overview[], cct[], guide[], buckets:{[bid]:{...}} }
// ══════════════════════════════════════════════════
window.STORE = { guides:{} };
let currentGuideId = null;
let saveTimer = null;

window.__onLoaded  = () => { renderHomeList(); if(currentGuideId) renderGuide(currentGuideId); };
window.__initStore = () => { window.STORE={guides:{}}; renderHomeList(); };

// ── helpers ──────────────────────────────────────
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt  = n => n?'₩'+Number(n).toLocaleString('ko-KR'):'-';
const fmtN = n => { const v=parseInt(String(n||'').replace(/[^0-9]/g,'')); return isNaN(v)?'':v.toLocaleString('ko-KR'); };
const unF  = s => { const v=parseInt(String(s||'').replace(/[^0-9]/g,'')); return isNaN(v)?0:v; };
const num  = s => { const v=parseInt(String(s||'').replace(/[^0-9]/g,'')); return isNaN(v)?null:v; };
const uid  = () => '_'+Math.random().toString(36).slice(2,9);
const now  = () => new Date().toLocaleString('ko-KR');
const THEME_COLORS = {e:'#185FA5',x:'#3B6D11',t:'#993C1D',p:'#4A2C8F',g:'#0D5C3E'};
const THEME_CLS    = {e:'bsh-e',x:'bsh-x',t:'bsh-t',p:'bsh-p',g:'bsh-g'};

function getGuide(id){ return window.STORE.guides[id]; }
function G(){ return getGuide(currentGuideId); }

function secBadge(s){
  if(s==='60초') return `<span class="badge b-60">60초</span>`;
  if(s==='90초') return `<span class="badge b-90">90초</span>`;
  if(s==='확인 필요') return `<span class="badge b-q">확인 필요</span>`;
  return `<span style="color:var(--text-3)">-</span>`;
}
function typeBadge(t){
  const m={ing:'b-ing 협의 중',alt:'b-alt 대안','2nd':'b-2nd 2순위','1st':'b-1st 1순위',off:'b-off 제외'};
  const v=m[t]; if(!v) return '';
  const [cls,txt]=v.split(' ');

function rowCls(t){return{ing:'ch-ing',alt:'ch-alt','2nd':'ch-2nd',off:'ch-off'}[t]||'';}
function roiCls(r){if(!r)return'roi-l';return r>=0.9?'roi-h':r>=0.6?'roi-m':'roi-l';}

// ── save ─────────────────────────────────────────
function schedSave(){ /* 채널 데이터는 saveField로 자동 저장 */ }
function manualSave(){
  if(window.__saveDB) window.__saveDB(window.STORE);
  else localStorage.setItem('guides_local',JSON.stringify(window.STORE));
}

// 🔄 새로고침
function reloadFromFirebase(){
  if(!window.__reloadDB){ alert('Firebase 미연결 상태입니다.'); return; }
  window.__reloadDB();
}

// 섹션별 저장 (카드 저장 버튼)
function saveSection(section) {
  const g = G(); if(!g) return;
  const gid = currentGuideId;
  let path, value;
  if(section === 'overview') {
    path = `guides/guides/${gid}/overview`; value = g.overview||[];
  } else if(section === 'cct') {
    path = `guides/guides/${gid}/cct`; value = g.cct||[];
  } else if(section === 'guide') {
    path = `guides/guides/${gid}/guide`; value = g.guide||[];
  } else if(section === 'meta') {
    path = `guides/guides/${gid}/meta`; value = g.meta||{};
  }
  if(path && window.__saveSection) {
    window.__saveSection(path, value);
  }
}
function saveBucket(bid) {
  const g = G(); if(!g||!g.buckets[bid]) return;
  const b = g.buckets[bid];
  const path = `guides/guides/${currentGuideId}/buckets/${bid}`;
  const value = { id:b.id, name:b.name, theme:b.theme, target:b.target, note:b.note||'' };
  if(window.__saveSection) window.__saveSection(path, value);
}

// 버킷 구조 전체 저장 (이름/목표예산)
function saveAllBucketMeta() {
  const g = G(); if(!g) return;

// 실시간 원격 데이터 병합 — 타임스탬프로 내 수정 보호
// ── Presence 렌더링 ─────────────────────────────
function renderPresence(all) {
  const el = document.getElementById('presence-bar');
  if(!el) return;
  const others = Object.entries(all)
    .filter(([sid]) => sid !== window.__mySessionId)
    .map(([, v]) => v);

  if(!others.length) { el.innerHTML = ''; return; }

  el.innerHTML = others.map(u => {
    const editing = u.editing ? ` — ${u.editing}` : '';
    return `<span style="display:inline-flex;align-items:center;gap:5px;background:#E6F1FB;border-radius:20px;padding:3px 10px;font-size:11px;color:#0C447C;">
      <span style="width:7px;height:7px;border-radius:50%;background:#1D9E75;flex-shrink:0;"></span>
      ${esc(u.name||'접속자')}${esc(editing)}
    </span>`;
  }).join(' ');
}
function setSaved(msg){
  const d=document.getElementById('sDot'); const t=document.getElementById('sTxt'); const st=document.getElementById('sTime');
  if(d) d.className='sdot d-ok';
  if(t) t.textContent=msg||'저장됨';

}
function setSaving(){
  const d=document.getElementById('sDot'); const t=document.getElementById('sTxt');

function goHome(){ showScreen('home'); renderHomeList(); currentGuideId=null; }

// ── CREATE GUIDE ──────────────────────────────────
function openNewGuideModal(){

      {id:uid(),label:'편성 간격',val:'1시간 내 최대 2회 — 동일 채널 초과 금지'},

// ── META ──────────────────────────────────────────
function updateGuideMeta(field,val){ const g=G(); if(!g)return; g[field]=val; markUnsaved(); schedSave(); }

function renderOverview(){

  const el=document.getElementById('ov-wrap'); if(!el) return;
  el.innerHTML=`<table class="ov-table">
    ${rows.map(r=>`<tr>
      <td class="ov-key"><input class="ec" style="font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;" value="${esc(r.key)}" oninput="updateOv('${r.id}','key',this.value)"></td>
      <td>
        <input class="ec" value="${esc(r.val)}" oninput="updateOv('${r.id}','val',this.value)">
        ${r.sub!==undefined?`<input class="ec ec-sm" value="${esc(r.sub)}" placeholder="부제..." oninput="updateOv('${r.id}','sub',this.value)">`:``}
      </td>
      <td class="ov-del"><button class="btn-icon" onclick="removeOv('${r.id}')">✕</button></td>
    </tr>`).join('')}
    <tr><td colspan="3" style="padding:6px 16px;"><button class="btn-icon" style="font-size:12px;" onclick="addOvRow()">＋ 항목 추가</button></td></tr>
  </table>`;
}
function updateOv(id,field,val){ const g=G(); const r=(g.overview||[]).find(x=>x.id===id); if(r){r[field]=val;markUnsaved();schedSave();} }
function removeOv(id){ const g=G(); g.overview=(g.overview||[]).filter(x=>x.id!==id); renderOverview(); markUnsaved(); schedSave(); }
function addOvRow(){ const g=G(); if(!g.overview)g.overview=[]; g.overview.push({id:uid(),key:'항목',val:'',sub:''}); renderOverview(); markUnsaved(); schedSave(); }

// ── BUDGET TABLE ──────────────────────────────────
function getBucketStats(bid){
  const g=G(); const b=g.buckets[bid]; if(!b) return {};
  const rows=(b.rows||[]).filter(r=>r.type!=='off'&&r.type!=='2nd');
  const sumBudget = rows.reduce((s,r)=>s+(r.budget||0),0);
  const sumWish   = rows.reduce((s,r)=>s+(r.wish||0),0);
  const sumConf   = rows.reduce((s,r)=>s+(num(r.ag?.confirmed)||0),0);
  // 확정금액: 입력값 있으면 사용, 없으면(빈 문자열/null) 광고비로 대체. 단 "0"은 0으로 처리
  const sumAmt    = rows.reduce((s,r)=>{
    const a = r.ag?.amt;
    const v = (a===''||a===null||a===undefined) ? (r.budget||0) : (num(a)||0);
    return s+v;
  },0);
  const uRows     = rows.filter(r=>num(r.ag?.confirmed)>0);
  const avgUnit   = uRows.length===0?null:Math.round(uRows.reduce((s,r)=>{
    const a=(r.ag?.amt===''||r.ag?.amt===null||r.ag?.amt===undefined)?(r.budget||0):(num(r.ag?.amt)||0);
    const c=num(r.ag?.confirmed);
    return s+(c>0?a/c:0);
  },0)/uRows.length);
  return {sumBudget,sumWish,sumConf,sumAmt,avgUnit,chCount:rows.length};
}

function renderBudgetTable(){
  const g=G(); if(!g) return;
  const el=document.getElementById('budget-table-wrap'); if(!el) return;
  const bids = Object.keys(g.buckets||{});

function updateCh(bid,cid,field,val){
  const g=G(); const b=g.buckets[bid]; if(!b)return;

// 필드 단위 저장 래퍼 (디바운스 포함)
const FIELD_LABELS = {
  confirmed:'확정횟수', amt:'확정금액', sec:'확정초수', cmt:'코멘트',
  budget:'광고비', wish:'희망횟수', roi:'ROI', req:'요청사항', ch:'채널명'
};
const fieldSaveTimers = {};
function saveField(path, value, displayLabel) {
  const fieldKey = path.split('/').pop();
  const label = displayLabel || FIELD_LABELS[fieldKey] || fieldKey;
  if(window.__updatePresence) window.__updatePresence(label);
  clearTimeout(fieldSaveTimers[path]);
  fieldSaveTimers[path] = setTimeout(() => {
    if(window.__saveField) window.__saveField(path, value);
    else manualSave();
    setTimeout(()=>{ if(window.__updatePresence) window.__updatePresence(''); }, 5000);
  }, 800);
}

// 줄 단위 분리, 각 줄 15자 초과 시 ..., 최대 2줄 표시
function truncate2Lines(text) {
  if(!text) return '';
  const LIMIT = 25;
  const lines = text.split('\n').filter(l => l.trim() !== '');
  const result = lines.slice(0, 2).map(line => {
    line = line.trim();
    return line.length > LIMIT ? line.slice(0, LIMIT) + '...' : line;
  });
  return result.join('\n');
}
// truncate2Lines 결과를 HTML safe하게 변환 (줄바꿈은 보존)
function truncateHtml(text) {
  return truncate2Lines(text)
    .split('\n')
    .map(l => esc(l))
    .join('<br>');
}
let _cmtBid='', _cmtCid='', _cmtField='';

  document.getElementById('cmtModal').classList.add('on');
  setTimeout(()=>document.getElementById('cmt-modal-text').focus(), 100);
}
function closeCmtModal() {
  document.getElementById('cmtModal').classList.remove('on');
}
function saveCmtModal() {
  const val = document.getElementById('cmt-modal-text').value;
  if(_cmtField === 'req') {
    updateCh(_cmtBid, _cmtCid, 'req', val);
    const el = document.getElementById(`req-display-${_cmtCid}`);
    if(el) el.innerHTML = truncateHtml(val);
  } else if(_cmtField === 'cmt') {
    updateAg(_cmtBid, _cmtCid, 'cmt', val);
    const el = document.getElementById(`cmt-display-${_cmtCid}`);
    if(el) el.innerHTML = truncateHtml(val);
    const hint = el?.nextElementSibling;
    if(hint) hint.textContent = val ? '✏ 수정' : '+ 입력';
  }
  closeCmtModal();
}

// 버킷 헤더 + 예산배분표 해당 행 + 채널 합계 행을 DOM에서 직접 업데이트
function syncBudgetDisplay(bid){
  const g=G(); if(!g||!g.buckets[bid]) return;
  const b=g.buckets[bid];
  const rows=(b.rows||[]).filter(r=>r.type!=='off'&&r.type!=='2nd');

  // 채널 합계 행
  const sumBudget = rows.reduce((s,r)=>s+(r.budget||0),0);
  const sumWish   = rows.reduce((s,r)=>s+(r.wish||0),0);
  const sumAmt    = rows.reduce((s,r)=>{
    const a = r.ag?.amt;
    const v = (a===''||a===null||a===undefined) ? (r.budget||0) : (num(a)||0);
    return s+v;
  },0);
  const sumConf   = rows.reduce((s,r)=>s+(num(r.ag?.confirmed)||0),0);

  // 채널 테이블 합계 행
  const chTotal = document.getElementById(`ch-total-${bid}`);
  if(chTotal) chTotal.innerHTML=`
    <td colspan="2">합계</td>
    <td class="r">${fmt(sumBudget)}</td>
    <td></td>
    <td class="r">${sumWish}회</td>
    <td></td><td></td>
    <td class="r">${fmt(sumAmt)}</td>
    <td></td>
    <td class="r">${sumConf}회</td>
    <td></td><td></td><td></td>`;

  // 버킷 헤더 합산
  const bshSum = document.getElementById(`bsh-sum-${bid}`);
  if(bshSum) bshSum.innerHTML=`${fmt(sumBudget)} <span style="font-size:11px;font-weight:400;">채널 합산 / 희망 ${sumWish}회</span>`;

  // 예산배분표 행 (id 기반)
  const target = b.target||0;
  const diff   = sumBudget - target;
  const pct    = target>0?Math.min(Math.round(sumBudget/target*100),150):0;
  const barW   = Math.min(pct,100);
  const barCls = pct>100?'bar-over':pct>=80?'bar-ok':'bar-low';
  const diffTag= diff===0?`<span class="diff-zero">일치</span>`:diff>0
    ?`<span class="diff-pos">▲${fmt(diff)}</span>`
    :`<span class="diff-neg">▼${fmt(Math.abs(diff))}</span>`;
  const avgUnit= sumConf>0?Math.round(sumAmt/sumConf):null;

  const el_s=document.getElementById(`brow-sum-${bid}`);
  const el_d=document.getElementById(`brow-diff-${bid}`);
  const el_w=document.getElementById(`brow-wish-${bid}`);
  const el_a=document.getElementById(`brow-amt-${bid}`);
  const el_c=document.getElementById(`brow-conf-${bid}`);
  const el_u=document.getElementById(`brow-unit-${bid}`);
  if(el_s) el_s.innerHTML=`<span class="fw7">${fmt(sumBudget)}</span>`;
  if(el_d) el_d.innerHTML=`${diffTag}<br><div class="mini-bar-wrap"><div class="mini-bar-fill ${barCls}" style="width:${barW}%"></div></div><span style="font-size:10px;color:var(--text-3);">${pct}%</span>`;
  if(el_w) el_w.innerHTML=sumWish?sumWish.toLocaleString()+'회':'-';
  if(el_a) el_a.innerHTML=sumAmt>0?fmt(sumAmt):'-';
  if(el_c) el_c.innerHTML=sumConf>0?sumConf.toLocaleString()+'회':'-';
  if(el_u) el_u.innerHTML=avgUnit?fmt(avgUnit):'-';

  // 예산배분표 전체 합계 행
  updateBudgetTotalRow();
}

function updateMyName(name) {
  if(!name.trim()) return;
  window.__myName = name.trim();
  localStorage.setItem('myName', name.trim());
  // Presence 즉시 업데이트
  if(window.__updatePresence) window.__updatePresence('');
}

(function initMyName() {
  const saved = localStorage.getItem('myName');
  const el = document.getElementById('my-name-input');
  if(saved) {
    window.__myName = saved;
    if(el) el.value = saved;
  } else {
    // 이름 없으면 입력 유도
    setTimeout(()=>{
      const el2 = document.getElementById('my-name-input');
      if(el2 && !el2.value) el2.focus();
    }, 500);
  }
})();
